<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proctoring System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 48px 56px;
    width: 420px;
    text-align: center;
  }
  h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: .02em; color: #fff; margin-bottom: 6px; }
  .sub { font-size: 0.82rem; color: #666; margin-bottom: 36px; }
  label { display: block; text-align: left; font-size: 0.78rem; color: #888; margin-bottom: 6px; margin-top: 18px; }
  input {
    width: 100%;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 5px;
    color: #e0e0e0;
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: #555; }
  .err { font-size: 0.75rem; color: #c0392b; margin-top: 6px; display: none; }
  .err.show { display: block; }
  .btn {
    margin-top: 28px;
    width: 100%;
    padding: 11px;
    background: #1a6ee0;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
  }
  .btn:hover { background: #1559b8; }
  .divider { margin: 28px 0; border: none; border-top: 1px solid #222; }
  .tester-link {
    font-size: 0.8rem;
    color: #555;
  }
  .tester-link a { color: #888; text-decoration: none; }
  .tester-link a:hover { color: #aaa; }
</style>
</head>
<body>
<div class="card">
  <h1>Proctoring System</h1>
  <p class="sub">Enter your name to begin the exam session</p>

  <label>Your full name</label>
  <input type="text" id="nameInput" placeholder="e.g. Arnav Sharma" autocomplete="off">
  <div class="err" id="nameErr">Please enter your name.</div>

  <button class="btn" onclick="startSession()">Start Session</button>

  <hr class="divider">
  <p class="tester-link"><a href="/tester">Proctor / Tester login →</a></p>
</div>

<script>
  document.getElementById("nameInput").addEventListener("keydown", e => {
    if (e.key === "Enter") startSession();
  });

  // Show name error if redirected with ?error=name
  if (location.search.includes("error=name")) {
    document.getElementById("nameErr").classList.add("show");
  }

  function startSession() {
    const name = document.getElementById("nameInput").value.trim();
    if (!name) {
      document.getElementById("nameErr").classList.add("show");
      return;
    }
    location.href = "/testee?name=" + encodeURIComponent(name);
  }
</script>
</body>
</html>
